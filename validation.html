<!DOCTYPE html>
<html>
<head>
<title>Email Pattern Validation</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

</head>

<body ng-app="">

<form name="myForm">

Email:
<input type="text"
       name="myEmail"
       ng-model="email"
       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
       required>

<br><br>

<span ng-show="myForm.myEmail.$error.pattern">
Invalid Email Format
</span>

<span ng-show="myForm.myEmail.$error.required">
Email is required
</span>

</form>

</body>
</html>
